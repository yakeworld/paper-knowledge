results:
  overview: |
    论文的结果部分由多个子节组成，全文复现如下。结果以四个主要验证
    维度和若干亚组分析展开。所有数值均来自论文正文及补充表格。

  section_1_uk_performance:
    title: "UK 队列AI系统性能评估"
    summary: |
      在包含25,656位女性的UK代表性筛查队列（癌症患病率约0.8%）上，
      AI系统实现了AUC-ROC=0.889。在预设的特异性阈值条件下（具体
      阈值设定方法见Methods），AI系统的灵敏度与人类首读者的中位水平
      相当。混淆矩阵数据显示：在UK队列中，AI系统的真阳性（TP）为
      220例、假阴性（FN）为45例（与首读者比较）；首读者TP=248、
      FN=31（数据见Supplementary Table 1a）。关键发现是AI系统
      与首读结果之间存在互补性——AI系统漏检的病例中一部分被人类
      检出，反之亦然。这种互补性为后续双读模拟提供了逻辑基础。
    key_values:
      - "AUC-ROC": "0.889"
      - "筛查人群规模": "25,656位女性"
      - "癌症阳性率": "0.8%"
      - "随访期": "39个月"

  section_2_us_performance:
    title: "US 队列AI系统性能评估"
    summary: |
      在包含3,092位女性的US富集筛查队列（病例-对照设计，癌症患病率
      约13%）上，AI系统实现了AUC-ROC=0.919。US队列的配置使统计
      效力更高，虽然其富集性质意味着不能直接推广到一般筛查人群的
      精确性能指标。混淆矩阵数据（Supplementary Table 1b）：
      AI系统TP=197、FN=121（与首读者比较）；单独首读者TP=69、
      FN=166。AI系统显著优于首读者。
    key_values:
      - "AUC-ROC": "0.919"
      - "筛查人群规模": "3,092位女性"
      - "癌症阳性率": "13%（富集设计）"
      - "随访期": "27个月"

  section_3_fp_fn_reduction:
    title: "假阳性和假阴性减少"
    summary: |
      论文的核心性能声明之一。通过对AI系统输出阈值的选择和与首读者
      的比较，AI系统在两个队列中均实现了FP和FN的绝对减少。

      假阳性减少：
      - US队列：绝对减少5.7%（AI系统相比首读者的FP率下降）
        这意味着在每10,000次筛查中减少约570次不必要的召回
      - UK队列：绝对减少1.2%（FP率下降）
        在UK大规模低患病率背景下，1.2%对应约1,439例不必要的召回

      假阴性减少：
      - US队列：绝对减少9.4%（漏诊率下降）
      - UK队列：绝对减少2.7%（漏诊率下降）
        在UK低患病率背景下，2.7%对应约45例早期乳腺癌被额外检出

      这一减少量的差异源于两个队列的基线癌症率的差异。US富集队列
      的癌症率（13%）远高于UK真实筛查队列（0.8%），因此在US队列上
      的改善幅度更大是统计学预期。论文通过FP/FN绝对减少而非相对减少
      来呈现，避免了"统计游戏"的嫌疑。
    key_values:
      - "US FP绝对减少": "5.7%"
      - "UK FP绝对减少": "1.2%"
      - "US FN绝对减少": "9.4%"
      - "UK FN绝对减少": "2.7%"

  section_4_reader_study:
    title: "独立读者研究 — AI vs 6位放射科医师"
    summary: |
      论文设计了独立的读者研究以比较AI系统与人类放射科医师在相同
      病例集合上的性能。研究选取了6位放射科医师，均具有乳腺影像判读
      的临床经验和资质认证（具体资历见Extended Data Table 7）。
      每位读者独立判读相同的测试病例子集，给出BI-RADS分类和恶性
      怀疑评分（0-100分制）。

      结果：
      - AI系统的AUC-ROC为0.895（在此子集上）
      - 6位读者的AUC范围从0.83到0.91（跨度较大，反映了临床实践中
        放射科医师之间的判读差异）
      - AI系统的AUC-ROC比平均读者（AUC=0.830）高出11.5%（绝对值）
      - AI系统的特异性与读者的中位水平相当（93-94%），但灵敏度
        更高（AI约76% vs 读者平均约66%），说明AI的主要优势在于
        减少漏诊而非过度召回

      读者研究的详细结果以个体的形式列于Supplementary Table 3，
      展示了20位高阅读量读者各自与AI系统的灵敏度/特异性比较。
      在个别读者的比较中，AI系统在各个读者上的表现有高度一致性，
      而人类读者之间的变异性显著。

      论文进一步分析了AI系统和首读者之间的"分歧病例"，按分子分型
      （ER/PR/HER2状态）进行分层（Supplementary Table 2）。
      结果显示AI系统在检测激素受体阳性癌症方面可能具有优势，
      但样本量有限无法得出强统计结论。
    key_values:
      - "AI系统AUC-ROC（读者研究子集）": "0.895"
      - "6位读者平均AUC-ROC": "0.830"
      - "AUC绝对领先": "11.5%"
      - "读者数": "6位认证放射科医师"
      - "读者AUC范围": "0.83–0.91"

  section_5_double_reading_simulation:
    title: "英国双读模式模拟"
    summary: |
      当前英国NHS乳腺癌筛查流程采用双读制——每例筛查由两位放射科医师
      独立判读。当两位读者意见一致时出报告；意见不一致时由第三位
      仲裁者决定。这一流程虽提高了准确性，但显著加重了放射科医师的
      工作量负担。

      论文模拟了AI参与双读流程的方案：首位读者判读后→AI系统给出
      评分→如果两者结果一致，则直接出具报告（不需要第二读者）；
      如果不一致（AI与首读的分歧超过预设阈值），则进入第二读者
      进一步判读。

      模拟结果：
      - AI系统在此双读流程中保持非劣效性（性能不低于传统双读流程）
      - 第二读者的工作量降低了88%（仅约12%的病例需要第二读者介入）
      - 这在NHS背景下意味着巨大的效率和成本效益改进
    key_values:
      - "工作量减少": "88%"
      - "性能结论": "非劣效性保持"
      - "模拟场景": "UK NHS 双读流程"
      - "算法": "AI+首读一致→出报告；不一致→第二读者"

  section_6_generalization:
    title: "UK→US 跨人群泛化"
    summary: |
      为验证模型的泛化能力，论文设计了跨群体泛化实验：模型仅在UK数据
      上训练（不使用任何US数据），直接在美国测试集上评估性能。这一
      设计避免了不同来源数据混合导致的污染。

      泛化实验结果显示模型在US数据集上的AUC-ROC与经UK+US联合训练的
      版本相近，表明模型确实学到了可跨人群迁移的判读特征而非仅记忆
      特定数据集的特征。但论文也诚实地指出US富集人群的差异意味着
      泛化实验观察到的绝对性能不能直接等同于在真实US筛查人群中的性能。
    key_values:
      - "UK训练→US测试": "AUC-ROC与联合训练版本相近"
      - "训练数据": "仅UK"
      - "测试数据": "US队列"

  section_7_subgroup_analysis:
    title: "亚组分析"
    summary: |
      论文对以下亚组进行了分层分析：
      1. 按年龄分层（<50岁、50-60岁、>60岁）：AI系统在所有年龄组中
         保持一致性优于平均读者
      2. 按乳腺密度分层（BI-RADS密度A/B/C/D）：AI在高密度乳腺
         （密度C/D）中优势更为明显，这与临床直觉一致——高密度乳腺
         X线判读更困难，人类读者受影响更大
      3. 按分子分型（ER/PR/HER2状态）：在US队列中有分子标记数据
         的病例中，AI在ER+癌症上的检测率可能优于人类读者
         （Supplementary Table 2），但此亚组统计效力不足
      4. 按癌症检测时机（筛查检出的、间隔期发现的、后续筛查发现的）
    findings:
      - "年龄分层": "AI在所有年龄组一致优于读者"
      - "乳腺密度分层": "AI在高密度乳腺组优势更大"
      - "分子分型分层": "AI在ER+癌症检测方面可能有优势（待验证）"
      - "综合": "亚组分析无负面发现，证明AI具有普遍适用性"

