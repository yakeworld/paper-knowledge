        verdict: "✅"
        evidence: "FP/FN减少的四个数值（US 5.7%/9.4%, UK 1.2%/2.7%）已给出"

  paragraph_3:
    summary: |
      第三段扩展论文的验证力度：作者提供UK→US跨人群泛化的证据（模型
      仅在UK数据训练后在US数据上测试，证明系统的跨人群鲁棒性）。
      独立读者研究：6位放射科医师的独立评估表明AI系统在AUC-ROC上
