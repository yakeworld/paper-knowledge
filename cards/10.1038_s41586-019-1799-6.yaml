abstract: |
  论文摘要全文分析：

  研究背景：乳腺X线摄影筛查旨在更早阶段识别乳腺癌，从而提高治疗成功率。
  尽管全球多个国家已经建立了系统性的筛查计划，乳腺X线影像的判读仍
  面临高假阳性率和假阴性率的挑战。

  方法：论文提出了一种人工智能（AI）系统，由三个深度学习模型集成组成
  （Lesion Model, Breast Model, Case Model），分别从病变级、乳腺级和
  病例级进行多尺度分析。数据集来自英国的大规模代表性人群
  （N=25,656 位女性）和美国的富集型人群（N=3,092 位女性）。

  主要发现：
  - 假阳性减少：美国 5.7%、英国 1.2%（绝对值）
  - 假阴性减少：美国 9.4%、英国 2.7%（绝对值）
  - AI 在独立 6 位放射科医师研究中超越所有人：AUC-ROC 领先
    平均放射科医师 11.5 个百分点
  - 在英国双读模式模拟中，AI 保持非劣效性且减少第二读者工作量 88%

  结论：该 AI 系统在乳腺癌筛查中展现出超越人类放射科医师的性能，
  为开展前瞻性临床试验奠定了基础。

  [注：以上为论文摘要的结构化重述，非原文直引。]

