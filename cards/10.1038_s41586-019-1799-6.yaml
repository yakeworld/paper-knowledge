      inference_augmentation: "500 runs with random perturbations (test time)"

    datasets:
      - name: "UK screening cohort"
        type: "真实代表性筛查人群"
        size: "25,656 women, 约 1M 张乳腺摄影"
        cancer_rate: "0.8%"
        follow_up: "39 months"
        source: "NHS Breast Screening Programme (OptimaM collaboration)"
      - name: "US enriched cohort"
        type: "富集(病例-对照)人群"
        size: "3,092 women"
        cancer_rate: "13%"
        follow_up: "27 months"
        source: "合作医疗机构"
      - name: "CBIS-DDSM (补充训练)"
        type: "公开数据库"
        size: "1,076 women, 1,939 images"
        use: "ROI标注补充训练"
        source: "The Cancer Imaging Archive"

    key_knowledge:
      - "AI 三模型 ensemble 架构涵盖了病变级、乳腺级、全病例级的多尺度分析"
      - "Lesion Model 的 noisy-OR 聚合使得 AI 可利用病例级标注训练病变级分类 — 这是一个关键的设计创新"
      - "UK→US 泛化实验验证了模型在跨人群（不同设备、不同人群背景）的鲁棒性"
      - "双读模拟显示 AI 可替代第二读者且保持非劣效性，工作量减少 88%"

