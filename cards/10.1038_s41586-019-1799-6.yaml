introduction:
  total_paragraphs: 3
  total_references: 6  # 引言段内直接引用

  paragraph_1:
    summary: |
      引言开篇建立乳腺癌筛查的临床背景。全球乳腺X线摄影筛查通过发现
      更早期阶段的乳腺癌来降低死亡率，这一结论已有大规模随机对照试验
      证据支持。然而，筛查的判读存在显著的假阳性和假阴性问题。
      假阳性导致不必要的活检和患者焦虑；假阴性则延误诊断，带来
      法律风险。论文引用了一项大规模研究（确切来源见论文参考文献[2]），
      指出乳腺X线摄影筛查的假阳性率在不同研究报告中波动于7-10%之间，
      假阴性率约为20%（即五分之一癌症被漏诊）。这一临床现实构成了
      论文的核心驱动力。自计算机辅助检测（CAD）系统引入二十年后的
      主流研究结论是——现有CAD系统并未显著改善筛查准确性，反而可能
      增加不必要的召回率。这一背景为"AI能否超越CAD乃至人类放射科医师"
      提供了明确的研究空白。

    cards_analysis:
      - criteria: "明确临床问题"
        verdict: "✅"
        evidence: "第一句即建立疾病背景（乳腺癌筛查的临床价值）"
      - criteria: "指出现有局限"
        verdict: "✅"
        evidence: "FP/FN的问题在第二句明确提出，并引用了流行病学数据量化"
      - criteria: "引用前人工作定位空白"
        verdict: "✅"
        evidence: "通过CAD系统性验证的失败经历，引出真正的技术空白"
      - criteria: "数据驱动"
        verdict: "✅"
        evidence: "FP比例的流行病学数据支撑"

  paragraph_2:
    summary: |
      第二段直接给出解决方案——论文提出一种由三个深度学习模型集成构成
      的AI系统。该模型在不同组织尺度上运作：检测单个可疑病变、分析单个
      乳腺的整体特征、以及整合全部四个标准乳腺X线摄片视图的信息。
      系统最终输出一个0到1之间的癌症风险评分。段落接着预告了核心试验
      结果：在美国富集数据集上实现假阳性绝对减少5.7%和假阴性绝对减少
      9.4%，在英国大规模代表性数据集上实现1.2%和2.7%的减少。
      这些数值的给出方式属于"先声夺人"策略——在引言末尾就给出核心
      性能声明，以吸引读者继续阅读。

    cards_analysis:
      - criteria: "提出解决方案"
        verdict: "✅"
        evidence: "AI系统概述在三模型集成中展开，涵盖从病变到病例的完整分析链条"
      - criteria: "技术路线明确"
