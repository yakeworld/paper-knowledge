# ============================================================================
# 模块一：写作质量评估
# ============================================================================

writing_quality:
  overall_score: "92/100 — Nature 顶级期刊，结构高度模板化"

  # — Introduction CARDS 模型分析 —
  introduction_cards:
    model_compliance: "完全合规"
    analysis: |
      论文引言遵循 Nature 标准"漏斗式"结构，完全符合 CARDS
      (Checklist for AI in Medical Diagnostics) 对 Introduction 的要求。

    paragraph_analysis:
      - paragraph: "1"
        start: "Screening mammography aims to identify breast cancer..."
        end: "...false positives and false negatives²."
        role: "【背景建立】流行病学和临床背景"
        cards_check: "✅ 符合 — 明确疾病负担和临床困境"
        why: "以筛查性乳腺摄影的全球普及和大规模获益开篇（背景），
              随即指出假阳性和假阴性这一长期未解决的临床挑战（空白）。
              这是 CARDS 要求的'临床问题描述'和'当前局限'的完美示范。"

      - paragraph: "2"
        start: "Here we present an artificial intelligence (AI) system..."
        end: "...by 9.4% and 2.7% in false negatives."
        role: "【方案提出】AI 系统概述+性能声明"
        cards_check: "✅ 符合 — 明确AI方法方向和初步性能"
        why: "直接给出 AI 方法（solution）并预告关键性能指标，
              属于 CARDS 要求的'拟议方法概述'。Nature 要求在引言末尾
              预告核心结果，该段做到了。"

      - paragraph: "3"
        start: "We provide evidence of the ability..."
        end: "...workload of the second reader by 88%."
        role: "【方法亮点+结果预告】泛化性、读者比较、模拟"
        cards_check: "✅ 符合 — 关键验证维度概括"
        why: "三个关键实验（泛化性测试、6读者比较、UK双读模拟）
              预告论文的核心验证框架。CARDS 要求验证方案概况，
              此处以结论形式给出，高度浓缩。"

    overall_judgment: |
      引言严格遵循 Nature 模板：P1 临床背景与空白 →
      P2 方案概述与性能声明 → P3 验证框架预告。
      CARDS 的所有 Introduction 项目（背景/空白/方案/验证框架）
      均在 3 个自然段内覆盖。无冗长述评，无过度引用。

  # — Discussion 理论体系分析 —
  discussion_analysis:
    theoretical_framework: |
      Discussion 按以下理论体系组织：

      1. 【临床落地评估】先讨论假阳性/假阴性减少的临床意义
         （引用真实筛查数据量化影响）
      2. 【读者比较】6 位放射科医生的人机对比，
         AI 超越所有人类读者（AUC 领先 11.5% 绝对值）
      3. 【双读模拟】UK 双读模式的 AI 替代方案，
         工作负载减少 88%，非劣效性保持
      4. 【泛化性】UK→US 跨人群泛化的证据与限制
      5. 【局限性】明确列出：回顾性设计、AI 辅助未测、
         US 数据集富集性偏差、未涵盖 tomosynthesis
      6. 【前景展望】呼吁前瞻性临床试验

    structural_evaluation: "优 — 从临床意义→人机对比→落地模拟→局限→前景的递进结构"

    alternative_expression:
      - current: "The AI system outperformed all of the human readers."
        alternative: "When benchmarked against the average radiologist, the AI system achieved an 11.5% higher AUC-ROC (absolute margin), indicating a statistically significant performance advantage at the population level."
        rationale: "当前表述直接但缺少量化和统计严谨性。替代方案明确给出差异大小和方向。"

      - current: "This robust assessment paves the way for clinical trials."
        alternative: "These findings establish the requisite evidence base—retrospective validation on 28,296 UK and 3,092 US exams—to justify and inform the design of prospective clinical trials evaluating AI-assisted screening workflows."
        rationale: "当前表述过于笼统。替代方案明确说明了 retrospective 证据基础（N=31,388）如何为前瞻性试验提供设计依据。"

    cards_assessment:
      scientific_background: "✅ 明确"
      clear_hypothesis: "✅ 隐含（AI 可超越人类读者）"
      methods_reproducible: "△ 部分 — 模型细节在 Supplementary，但数据和超参数不完全可复现"
      results_verified: "△ 部分 — 核心结果可复现，但训练数据不可获取"
      limitation_stated: "✅ 坦诚 — 6项局限明确列出"
      code_availability: "❌ 未提供（2020年政策不要求）"
      data_availability: "❌ 受限于患者数据隐私"
      overall: "论文结构高度完整，符合 Nature/CARDS 要求。扣分项在于代码和数据不可获取（2020年标准）。"

# ============================================================================
# 模块二：实验设计评估
# ============================================================================

experimental_design:
  overall_score: "88/100 — 大规模临床验证，设计严谨但有局限性"

  trial_registration: "未注册（2020年标准）"
  study_type: "回顾性验证 + 独立读者研究"

  # 逐项验证
  checklist:
    - item: "1. 研究目标是否明确？"
      status: "✅"
      evidence: "标题和引言明确：评估AI在乳腺癌筛查中的国际性能。目标问题明确：能否超越人类读者？"
      why_pass: "SC (Specific) — 评估 AI 在乳腺癌筛查场景下的敏感度和特异度"

    - item: "2. 数据集是否足够且代表性？"
      status: "✅"
      evidence: "UK：无症状筛查人群，25,656 位女性，真实代表性（癌症率 0.8%）。US：富集数据集，3,092 位女性（癌症率 13%）"
      why_pass: "UK 数据代表真实筛查场景，US 数据提供统计效力，双队列设计增加了外部有效性"

    - item: "3. 金标准定义是否合理？"
      status: "✅"
      evidence: "病理活检确认 + 随访确认（UK 39个月、US 27个月的癌症登记数据）"
      why_pass: "病理学证据是乳腺癌诊断的金标准。对于筛查阴性者，至少2年随访足够捕捉后续临床确诊"

    - item: "4. 读者研究设计是否合理？"
      status: "△"
      evidence: "6 位放射医师 vs AI，采用回顾性标签（BI-RADS）而非真实临床决策"
      why_margin: "读者研究是在回顾性条件下进行（标签已知？），而非实时临床决策。6 位读者量偏小，且缺乏不同亚专业/经验的代表性"

    - item: "5. 评估指标是否全面？"
      status: "✅"
      evidence: "AUC-ROC, AUC-PR, Sensitivity, Specificity, PPV, NPV, FP/FN reduction rates"
      why_pass: "既包含阈值无关指标（AUC）又包含阈值依赖指标，覆盖临床决策的多个维度"

    - item: "6. 交叉验证和过拟合控制？"
      status: "✅"
      evidence: "独立的训练/验证/测试集划分，Reader study 使用独立的测试子集"
      why_pass: "固定训练集→验证集优化→独立测试集评估的三段式设计，且 UK/US 数据各自分离"

    - item: "7. 统计分析方法是否正确？"
      status: "✅"
      evidence: "DeLong 检验比较 AUC，Bootstrap 法计算置信区间（2000次重采样）"
      why_pass: "DeLong 法是 AUC 比较的标准非参数方法，Bootstrap 适用于复杂统计量的区间估计"

    - item: "8. 亚组分析是否合理？"
      status: "✅"
      evidence: "按年龄、乳腺密度、癌症分子分型（ER/PR/HER2）分层分析"
      why_pass: "覆盖了临床最关心的亚组：年龄影响筛查效能、乳腺密度影响AI检测、分子分型关联治疗策略"

    - item: "9. 双读模拟是否公正？"
      status: "✅"
      evidence: "AI 参与 UK 双读流程的模拟：首读 + AI → 一致则出报告，不一致则第二读者裁决"
      why_pass: "模拟忠实于 UK NHS 的真实双读流程（而非主观假设），结果真实反映 AI 替代第二读者的可能性"

    - item: "10. 外部验证是否充分？"
      status: "△"
      evidence: "UK→US 跨人群泛化测试（模型仅用 UK 数据训练，在 US 上测试）"
      why_margin: "仅一个外部验证来源。UK和US人群均为西方人群（白种人为主），缺乏亚洲/非洲人群的验证"

  key_flaws:
    - "回顾性设计 — 无法反映真实临床决策的动态性"
    - "读者研究非实时 — 放射科医生在已知研究背景下可能改变行为（Hawthorne效应）"
    - "缺失各亚专业、经验水平的全面读者对比"
    - "US数据集富集性质可能高估AI在真实筛查中的表现"

