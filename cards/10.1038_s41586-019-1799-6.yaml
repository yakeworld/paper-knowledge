usage:
  safe_to_cite: true
  citation_precaution: |
    本卡片是对论文全文的知识复现。核心数值（AUC、FP/FN减少率、
    读者比较、双读模拟）已通过补充表格和正文验证。引用时建议
    注原论文出处：
    'McKinney et al. Nature 577, 89–94 (2020)'

  copyright_compliance:
    strategy: "全文内容分析性重述"
    compliance: "基于《著作权法》第二十二条合理使用原则"
    not_copied: "论文原文段落、直接文字、编排结构"
    content_covered:
      - "所有摘要内容（以分析形式呈现）"
      - "所有引言段落（逐段分析）"
      - "所有结果数据（结构化重述+混淆矩阵）"
      - "所有讨论内容（总结+理论分析）"
      - "所有方法细节（改写复述）"
      - "所有补充表格数据（结构化呈现）"
      - "所有参考文献（清单+评估）"
    content_omitted:
      - "论文直接原文引用（替换为改写重述）"
      - "图表（仅文字描述所含信息，不复制图像本身）"
