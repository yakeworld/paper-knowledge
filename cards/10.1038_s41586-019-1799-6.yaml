# ============================================================================
# 模块 VI：引用质量
# ============================================================================

references:
  total_count: 45
  structure_analysis: |
    论文引用的参考文献按功能可归为四层：

    第一层：临床背景（5-7篇）
    - 乳腺癌筛查指南和大规模临床试验
    - 全球癌症统计（GLOBOCAN等）
    - 假阳性/假阴性的流行病学著作
    评估：恰当，引用权威来源。

    第二层：技术基础（10-15篇）
    - RetinaNet / Focal Loss (Lin et al. 2017/2018)
    - MobileNetV2 (Sandler et al. 2018)
    - ResNet (He et al. 2016)
    - ResNet v2 (He et al. 2016)
    - 深度学习和医学影像的综述文献
    评估：恰当，引用建立核心方法的创始文献。但He et al. 2016
    Identity Mappings以arXiv预印本形式引用，在论文发表时（2020年）
    该文已在CVPR 2016发表，应有正式会议版本的DOI。

    第三层：医学AI相关（10-15篇）
    - 前人在乳腺X线/病理AI上的工作
    - 人机对比研究
    - 医学AI的可解释性和伦理讨论
    评估：恰当，客观定位自身贡献。

    第四层：方法和指南（5-8篇）
    - STARD报告指南
    - AUC统计方法（DeLong 1988）
    - Bootstrap统计方法
    - BI-RADS分类标准
    评估：严谨，引用标准方法文献。

  issues:
    - issue: "arXiv引用替代已发表版本"
      severity: "P2"
      evidence: "He et al. Identity Mappings (arXiv:1603.05027) 论文已在CVPR 2016发表"
      fix: "引用CVPR版本而非arXiv"

    - issue: "Supplementary引用缺少DOI"
      severity: "P2"
      evidence: "Nature的Supplementary引用格式不要求DOI，但这降低了可验证性"
      fix: "无（Nature格式规范，非论文问题）"

    - issue: "数据集引用不完整"
      severity: "P3"
      evidence: "UK和US数据来源未提供公共可访问的标识符"
      fix: "已在补充材料中描述，可作为参考但非开放数据"

