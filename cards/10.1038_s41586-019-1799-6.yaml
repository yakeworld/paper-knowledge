  # 结构化知识提取
  knowledge_structure:
    domain: "Breast cancer screening"
    methodology: "Deep learning ensemble (3 models)"
    models_used:
      - "Lesion Model: RetinaNet detector + MobileNetV2 classifier + noisy-OR aggregation"
      - "Breast Model: ResNet-v2-50 per-image + shared classification + max aggregation"
      - "Case Model: ResNet-v1-50 all-image concatenation + hidden layer"

    training_details:
      hardware: "Google TPUs"
      framework: "Tensorflow"
      augmentation: "Elastic deformation, shearing, rescaling, translation, flipping"
