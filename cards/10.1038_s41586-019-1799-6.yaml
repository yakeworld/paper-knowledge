discussion:
  structural_analysis: |
    Discussion按照以下逻辑链组织，共约6个段落：

    段落1：临床意义的量化评估
    将FP/FN减少量转化为绝对人口基数。以UK筛查项目为例，每年约200万
    次筛查，1.2%的FP减少意味着每年减少约24,000次不必要的召回；
    2.7%的FN减少意味着每年多检出约5,400例早期癌症。这些数值有助于
    读者/政策制定者理解AI技术在实际部署中的潜在社会影响。

    段落2：读者研究结论的深入阐释
    AI系统超越全体6位放射科医师的显著性，以及读者间变异性的量级。
    读者AUC从0.83到0.91的跨度意味着在临床实践中"哪位放射科医师判读"
    本身就是一个重要的质量变量。AI系统为缩小这种变异性提供了可能。

    段落3：双读模拟的落地意义
    双读制本身的主要局限是人力成本。88%的工作量减少为NHS提供了
    重新分配放射科医师人力资源的方案：而非减少医师编制，而是将
    节省的人力转向更需要临床判断的复杂病例。论文为模拟设计的
    保守假设（即AI仅替代第二读者而非首读者）实际上可能低估了
    AI可以释放的潜力。

    段落4：UK→US泛化性
    AI系统跨人群泛化的成功是论文的关键技术创新贡献之一。在医学AI
    领域，模型在不同设备供应商（UK的Hologic、Siemens vs US的
    GE、Hologic、Siemens、Fuji、Philips等）、不同人群特征和不同
    临床实践中的泛化能力是决定其临床落地资格的核心要素。

    段落5：局限性（关键）
    论文明确列出以下局限：
    a) 回顾性设计——无法模拟真实临床决策的动态性和医师在完整
       临床情境下的综合判断
    b) 读者研究在回顾性条件下进行，而非嵌入真实临床流程
    c) US数据集为富集设计（病例-对照），不能直接推算真实
       筛查人群的PPV/NPV
    d) AI辅助模式下的人类表现尚未测试——论文仅评估AI独立和
       人类独立，而非"AI辅助人类"
    e) 未涵盖数字乳腺断层合成（tomosynthesis/3D mammography）
    f) 仅包含两个国家的数据，缺乏更多样化人群的验证

    段落6：前景展望
    呼吁进行前瞻性临床试验。提出AI系统可能首先用于辅助而非替代
    放射科医师。论文指出将AI整合到临床工作流并评估其对患者结局
    的实际改善是下一步的关键任务。

  theoretical_framework: |
    Discussion采用"影响力→验证→落地→泛化→局限→前景"的递进式
    理论框架，与标准学术论文的宏观讨论结构一致。但其独特之处在于：
    每一段都紧密锚定在前面呈现的具体数据上，而非泛泛而谈。这是
    Nature/CARDS级别论文的共性——讨论不以新观点为主导，而是对结果
    的深入解读。每段首句都回应某一结果段落的主题，形成"
    结果段→讨论段"的镜像映射。

  alternative_expression_suggestions:
    - target: "讨论第5段（局限性）"
      suggestion: "当前以列表方式陈述局限，建议改为'问题-解决方案'配对结构"
      example: |
        局限a（回顾性设计）可配对：'我们正在进行的[XX]前瞻性试验
        将直接评估该问题'
        局限d（AI辅助未测）可配对：'我们计划在后续工作中测试
        AI辅助模式下的读者表现'
      rationale: "当前的局限段落虽然诚实但略显消极，配对结构可将局限
                  同时转化为研究路线图"

    - target: "讨论第6段（前景展望）"
      suggestion: "前景展望可更具体一些"
      example: |
        '建议开展AI vs 双读模式 vs AI辅助单读模式的
        三臂非劣效性子随机对照试验（sample size estimation:
        N≈80,000 screening exams for 80% power to detect
        non-inferiority with 2% margin）'
      rationale: "当前前景泛泛而谈，给出具体试验设计参数会显著增强
                  行动导向性"

# ============================================================================
# 模块 IV：方 法（Supplementary全文复现）
# ============================================================================

methods:
  source: "正文 Methods + Supplementary Methods（全文共约16,000字符）"

  roi_annotations:
    summary: |
      模型训练使用了三种来源的感兴趣区域（ROI）标注：
      1. UK OPTIMAM数据库：8,277个ROI，覆盖7,672张影像，来自
         3,871位女性。ROI以矩形框形式标注了后续活检确认的病变位置。
      2. Google Health自建标注平台：通过基于Web的标注平台，从确诊
         癌症的患者中额外收集。UK队列：2,156个ROI，覆盖2,145张影像，
         892位女性。US队列：3,549个ROI，覆盖1,917张影像，694位女性。
         每张影像由美国认证乳腺影像技师标注疑似原发肿瘤的矩形框。
      3. CBIS-DDSM公开数据集：额外补充2,073个ROI，覆盖1,939张影像，
         1,076位女性。

  ai_system_overview:
    summary: |
      AI系统由三个深度学习模型集成构成，分别在不同组织尺度上进行分析。
      各模型输出0-1之间的癌症风险评分，最终预测为三个模型预测的均值。
      所有模型使用数据增强（弹性变形、剪切、缩放、平移、翻转），
      预测结果为3次随机训练运行的均值。框架：Tensorflow，初始化：
      ImageNet预训练（如适用），硬件：Google TPU。

    model_1_lesion_model:
      summary: |
        双阶段架构，聚焦于单个可疑病变。
        第一阶段：RetinaNet目标检测模型应用于单张影像，在所有四个标准
        视图（RMLO、LCC、LMLO、RCC）上检测可疑区域。输入尺寸：
        全屏裁切为4096×4096后降采样至2048×2048。
        第二阶段：从每张影像的最高评分位置提取512×512区域（共10个），
        连同对侧乳房的参考区域，重采样至409×409，输入MobileNetV2
        共享特征提取器。影像视图、侧位、检测坐标和患者年龄编码后
        与影像特征拼接进行二分类。分类器参数跨区域共享。
        恶性预测结果通过noisy-OR操作聚合到病例级评分（假设各病变
        之间独立，计算至少一个病变为恶性的概率）。
        Loss：Focal loss，优化器：SGD with momentum，mini-batch
        size=4，学习率使用cosine decay。UK+US数据联合预训练后
        分数据集微调。推理时平均500次随机增强。

    model_2_breast_model:
      summary: |
        乳腺级模型，分析单个乳腺的整体影像特征。
        ResNet-v2-50作为影像特征提取器（共享权重），输入尺寸
        4096×3328。每侧乳腺的两个视图（MLO+CC）的特征向量拼接后
        输入后继神经网络。后继网络：4个残差块（bottleneck layer，
        步长=4）→ 4个残差块（步长=2）→ 4个残差块（步长=2）→
        1×1卷积 → 平均池化 → 乳腺级癌症概率。两侧乳腺取最大值
        作为病例级评分。端到端训练，120,000步，Adam优化器，
        lr=1e-4，每1,875步减半。

    model_3_case_model:
      summary: |
        全病例级模型，整合全部四个影像视图的信息。
        ResNet-v1-50特征提取器（共享权重），输入2048×2048。
        全部四视图的特征向量拼接后通过512维隐藏层进行二分类。
        UK+US联合训练，无单独微调阶段，取每个数据集验证集
        AUC最高的checkpoint。Loss、优化器同Lesion Model。
        推理时平均500次增强。

  datasets_details:
    uk_cohort:
      inclusion: "UK NHS Breast Screening Programme无症状筛查女性"
      exclusion: "STARD流程筛选（Supplementary Figure 1）"
      size: "25,656位女性（筛选后），含阳性病例约0.8%"
      demographics: "白人为主，45-70岁女性"
      equipment: "Hologic、Siemens等乳腺X线摄影设备"
      follow_up: "39个月（通过NHS癌症登记系统确认）"
      ethical: "NHS批准匿名化使用（无需知情同意豁免）"
      ground_truth: "病理活检+39个月随访。阳性=病理确认；阴性=至少39个月未登记癌症"

    us_cohort:
      inclusion: "US多机构合作病例-对照设计"
      design: "富集队列（病例：对照≈1:2或更高）"
      size: "3,092位女性，癌症率约13%"
      demographics: "白人为主，年龄分布接近UK队列但更广泛"
      equipment: "GE、Hologic、Siemens、Fuji、Philips等5家供应商"
      follow_up: "27个月（通过机构癌症登记+病理报告）"
      ethical: "各机构IRB批准"

  statistical_analysis:
    summary: |
      - 性能指标：AUC-ROC、AUC-PR、Sensitivity、Specificity、PPV、NPV
      - AUC比较：DeLong检验（非参数方法，适用于比较两个ROC曲线）
      - 置信区间：Bootstrap法，2,000次重采样
      - 读者研究：6位读者分别比较+平均读者比较
      - 双读模拟：预设阈值规则，性能用非劣效检验评价
      - 泛化实验：仅用UK数据训练，US数据测试
      - 亚组分析：年龄、乳腺密度、分子分型分层
      - 多重比较：未明确报告多重比较校正。

  limitations:
    - "回顾性设计：不能模拟真实临床决策"
    - "读者研究非实时：放射科医师已知在研究环境中"
    - "US富集数据集：不能直接外推至真实筛查人群"
    - "AI辅助模式未测试：仅评估AI独立vs人类独立"
    - "未评估tomosynthesis"
    - "仅两个国家"
    - "代码和数据未公开（Google专有）"

